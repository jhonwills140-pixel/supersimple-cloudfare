<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  
  <!-- Google reCAPTCHA v2 -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 25px;
    }
    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 17px;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover { 
      background: #1e3a8a; 
    }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .g-recaptcha {
      margin: 15px 0;
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Sign In</h2>
   
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
     
      <!-- Google reCAPTCHA -->
      <div class="g-recaptcha" 
           data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
           data-callback="onRecaptchaSuccess">
      </div>
    
      <button type="submit" id="loginBtn" disabled>Login</button>
    </form>
  </div>

  <script>
    let recaptchaToken = "";

    // Callback when user solves reCAPTCHA
    window.onRecaptchaSuccess = function(token) {
      recaptchaToken = token;
      document.getElementById('loginBtn').disabled = false;
      console.log("✅ reCAPTCHA Solved Successfully");
    };

    // Multiple Users
    const users = [
      { email: "nasir4u@gmail.com", password: "nasir mehmood", name: "Nasir" },
      { email: "admin@example.com", password: "admin123", name: "Admin" },
      { email: "user@example.com", password: "user123", name: "Test User" }
    ];

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!recaptchaToken) {
        alert("Please complete the reCAPTCHA verification first!");
        return;
      }

      // ============== POST DATA FOR BURP SUITE ==============
      const postData = {
        email: email,
        password: password,
        g_recaptcha_response: recaptchaToken,
        timestamp: new Date().toISOString(),
        user_agent: navigator.userAgent
      };

      console.log("🚀 POST Request Data (Capture in Burp Suite):");
      console.table(postData);

      // Check Credentials
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        alert(`✅ Login Successful! Welcome ${user.name}`);
        window.location.href = "welcome.html";
      } else {
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '50%';
        errorDiv.style.left = '50%';
        errorDiv.style.transform = 'translate(-50%, -50%)';
        errorDiv.style.backgroundColor = '#dc2626';
        errorDiv.style.color = 'white';
        errorDiv.style.padding = '35px 50px';
        errorDiv.style.borderRadius = '12px';
        errorDiv.style.fontSize = '23px';
        errorDiv.style.fontWeight = 'bold';
        errorDiv.style.textAlign = 'center';
        errorDiv.style.boxShadow = '0 10px 40px rgba(0,0,0,0.4)';
        errorDiv.style.zIndex = '10000';
        errorDiv.innerHTML = `Aby Saaly!<br><br>Wrong Email or Password!`;
        
        document.body.appendChild(errorDiv);
        setTimeout(() => errorDiv.remove(), 4000);

        // Clear fields
        document.getElementById('email').value = "";
        document.getElementById('password').value = "";
      }
    });
  </script>
</body>
</html>
